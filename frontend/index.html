<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XR AR/VR Toggle (Modern UI)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { margin:0; overflow:hidden; font-family:'Segoe UI', sans-serif; background:#e6f0ff; }
  canvas { display:block; }

  #ui {
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    background: rgba(255,255,255,0.92);
    padding:12px 16px;
    border-radius:14px;
    box-shadow:0 12px 32px rgba(0,0,0,0.18);
    display:flex;
    gap:12px;
    align-items:center;
    backdrop-filter: blur(8px);
  }

  #promptInput {
    padding:8px 12px;
    font-size:15px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    flex:1;
  }

  button {
    padding:8px 16px;
    font-size:14px;
    border:none;
    border-radius:8px;
    background:#4a90e2;
    color:white;
    cursor:pointer;
  }

  .switch-container {
    display:flex;
    align-items:center;
    gap:6px;
  }

  .switch-label { font-size:14px; }

  .switch {
    position: relative;
    display:inline-block;
    width:60px;
    height:28px;
  }

  .switch input { opacity:0; width:0; height:0; }

  .slider {
    position:absolute;
    inset:0;
    background:#ccc;
    border-radius:28px;
    cursor:pointer;
    transition:.3s;
  }

  .slider:before {
    content:"";
    position:absolute;
    height:22px;
    width:22px;
    left:3px;
    bottom:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
  }

  input:checked + .slider {
    background:#4a90e2;
  }

  input:checked + .slider:before {
    transform:translateX(32px);
  }
</style>
</head>

<body>

<div id="ui">
  <input id="promptInput" placeholder="Describe object...">
  <button id="sendPrompt">Send</button>

  <!-- === NEW CODE: Record button === -->
  <button id="recordButton">Record</button>
  <button id="mediaButton">Add Media</button>
  <input id="mediaInput" type="file" accept="image/*" style="display:none">

  <button id="xrButton">Enter XR</button>

  <div class="switch-container">
    <span class="switch-label">VR</span>
    <label class="switch">
      <input type="checkbox" id="arvrToggle">
      <span class="slider"></span>
    </label>
    <span class="switch-label">AR</span>
  </div>
</div>

<script type="module">
import * as THREE from './three/three.module.js';
import { GLTFLoader } from './three/GLTFLoader.js';
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';


let scene, camera, renderer;
let leftController, rightController;
let ground;
let currentSession = null;
let xrMode = 'VR';
let sharedRoot;

const loader = new GLTFLoader();
const grabbableObjects = [];

const FLOOR_Y = 0;

const RAY_IDLE   = 0xffff00;
const RAY_HOVER  = 0x00ffff;
const RAY_ACTIVE = 0xff0000;
const RAY_RECORDING = 0xff00ff; 

let transcriber = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

let speechMode = 'PROMPT'; // 'PROMPT' | 'COMMAND'
let hoveredObjectForSpeech = null;
let autoRecording = false;

let suppressXrBroadcast = false;

const API_TOKEN = "super_secret_api_token_123"; // REPLACE with your actual token
const SPACE_URL = "https://riasad-fyp-backend.hkbu.dev/generate";

const clientId = crypto.randomUUID();
let ws = null;
const objectsById = new Map();
const SYNC_INTERVAL_MS = 80;
const USER_SYNC_INTERVAL_MS = 200;

const userMarkers = new Map();
let userMarkerGroup = null;
let lastUserSync = 0;

let anchorArrow = null;
let anchorSaved = false;
let anchorMaterial = null;
let anchorSavedTransform = null;


init();
animate();

/* ---------------- INIT ---------------- */
function init() {

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xcfe8ff);
  scene.fog = new THREE.Fog(0xcfe8ff, 8, 25);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 3);

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  renderer.xr.addEventListener('sessionstart', () => {
    if (xrMode === 'AR' && anchorArrow) {
      prepareAnchorForAr();
    }
  });
  renderer.xr.addEventListener('sessionend', () => {
    currentSession = null;
    document.getElementById('xrButton').textContent = 'Enter XR';
    sendWS({ type: 'user-leave', senderId: clientId });
  });

  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.HemisphereLight(0xffffff, 0xaec6ff, 1.2));

  const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
  keyLight.position.set(5, 8, 4);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(1024,1024);
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
  fillLight.position.set(-5, 4, -3);
  scene.add(fillLight);

  ground = new THREE.Mesh(
    new THREE.PlaneGeometry(30,30),
    new THREE.MeshStandardMaterial({
      color: 0xe8f0e8,
      roughness: 0.9,
      metalness: 0.0
    })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  sharedRoot = new THREE.Group();
  scene.add(sharedRoot);

  userMarkerGroup = new THREE.Group();
  sharedRoot.add(userMarkerGroup);

  ensureAnchorArrow();

  leftController = renderer.xr.getController(0);
  rightController = renderer.xr.getController(1);
  scene.add(leftController, rightController);

  addControllerRay(leftController);
  addControllerRay(rightController);

  rightController.addEventListener('selectstart', () => grabStart(rightController));
  rightController.addEventListener('selectend',   () => grabEnd(rightController));
  rightController.addEventListener('squeezestart', () => rightController.userData.rotate = true);
  rightController.addEventListener('squeezeend',   () => rightController.userData.rotate = false);

  leftController.addEventListener('selectstart', () => leftController.userData.scaleUp = true);
  leftController.addEventListener('selectend',   () => leftController.userData.scaleUp = false);
  leftController.addEventListener('squeezestart',() => leftController.userData.scaleDown = true);
  leftController.addEventListener('squeezeend',  () => leftController.userData.scaleDown = false);

  document.getElementById('sendPrompt').onclick = sendPrompt;
  document.getElementById('promptInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendPrompt();
  });

  document.getElementById('xrButton').onclick = toggleXRSession;

  document.getElementById('recordButton').onclick = toggleRecording;
  const mediaButton = document.getElementById('mediaButton');
  const mediaInput = document.getElementById('mediaInput');
  mediaButton.onclick = () => {
    mediaInput.value = '';
    mediaInput.click();
  };
  mediaInput.addEventListener('change', async e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (!file.type || !file.type.startsWith('image/')) {
      console.error('Selected file is not an image');
      return;
    }

    const reader = new FileReader();
    reader.onerror = () => {
      console.error('Failed to read image file');
      mediaInput.value = '';
    };
    reader.onload = async () => {
      const result = reader.result;
      if (typeof result !== 'string') {
        console.error('Unexpected FileReader result');
        return;
      }
      const base64 = result.includes(',') ? result.split(',', 2)[1] : result;
      try {
        await sendImageBase64(base64);
      } catch (err) {
        console.error('Failed to send media image:', err);
      }
      mediaInput.value = '';
    };
    reader.readAsDataURL(file);
  });

  const toggle = document.getElementById('arvrToggle');
  toggle.addEventListener('change', async e => {
    xrMode = e.target.checked ? 'AR' : 'VR';
    if (currentSession) {
      await currentSession.end();
      await startXR();
    }
    if (!suppressXrBroadcast) {
      sendWS({ type: 'xr-mode', mode: xrMode, senderId: clientId });
    }
  });

  window.addEventListener('resize', onResize);
  window.addEventListener('beforeunload', () => {
    sendWS({ type: 'user-leave', senderId: clientId });
  });

  connectWebSocket();

}

/* --------- Toggle recording --------- */
async function toggleRecording() {
  const btn = document.getElementById('recordButton');

  if (!isRecording) {
    speechMode = 'PROMPT'; 
    await startRecordingInternal(); 
    btn.textContent = 'Stop Recording';
  } else {
    stopRecordingInternal(); 
    btn.textContent = 'Record';
  }
}

async function startRecordingInternal() {
  if (isRecording) return;

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.onstop = processAudio;
  mediaRecorder.start();
  isRecording = true;
}

function stopRecordingInternal() {
  if (!isRecording) return;
  mediaRecorder.stop();
  isRecording = false;
}


/* --------- Whisper audio processing --------- */
async function processAudio() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const arrayBuffer = await blob.arrayBuffer();

  const audioContext = new AudioContext({ sampleRate: 16000 });
  await audioContext.resume(); // IMPORTANT on Quest

  const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

  // Mix to mono if needed
  let pcm;
  if (audioBuffer.numberOfChannels === 1) {
    pcm = audioBuffer.getChannelData(0);
  } else {
    const ch0 = audioBuffer.getChannelData(0);
    const ch1 = audioBuffer.getChannelData(1);
    pcm = new Float32Array(ch0.length);
    for (let i = 0; i < ch0.length; i++) {
      pcm[i] = 0.5 * (ch0[i] + ch1[i]);
    }
  }

  // Guard: too short = Whisper returns nothing
  if (pcm.length < 16000) {
    console.warn('Audio too short for Whisper');
    return;
  }

  if (!transcriber) {
    transcriber = await pipeline(
      'automatic-speech-recognition',
      'Xenova/whisper-tiny',
      {
        device: 'webgpu',
        chunk_length_s: 30,
        stride_length_s: 5
      }
    );
  }

  const result = await transcriber(pcm);

  console.log('Whisper result:', result);

  const text = result?.text?.toLowerCase().trim();
  if (!text) return;

  if (speechMode === 'PROMPT') {
    document.getElementById('promptInput').value = result.text;
  }

  if (speechMode === 'COMMAND' && hoveredObjectForSpeech) {
    handleSpeechCommand(text, hoveredObjectForSpeech);
  }
}

function handleSpeechCommand(text, obj) {
  if (!obj || obj.userData?.isAnchorArrow) return;

  const t = text
    .toLowerCase()
    .replace(/[^\w\s]/g, '')
    .trim();

  /* ---------- SCALE UP / GROW ---------- */
  if (
    t.includes('scale up') ||
    t.includes('bigger') ||
    t.includes('big') ||
    t.includes('larger') ||
    t.includes('large') ||
    t.includes('increase') ||
    t.includes('increase size') ||
    t.includes('make it bigger') ||
    t.includes('make it big') ||
    t.includes('grow') ||
    t.includes('enlarge') ||
    t.includes('expand') ||
    t.includes('inflate') ||
    t.includes('zoom in')
  ) {
    obj.scale.multiplyScalar(1.2);
  }

  /* ---------- SCALE DOWN / SHRINK ---------- */
  else if (
    t.includes('scale down') ||
    t.includes('smaller') ||
    t.includes('small') ||
    t.includes('shrink') ||
    t.includes('reduce') ||
    t.includes('reduce size') ||
    t.includes('make it smaller') ||
    t.includes('make it small') ||
    t.includes('decrease') ||
    t.includes('compress') ||
    t.includes('deflate') ||
    t.includes('zoom out')
  ) {
    obj.scale.multiplyScalar(0.8);
  }

  /* ---------- ROTATE ---------- */
  else if (
    t.includes('rotate') ||
    t.includes('rotation') ||
    t.includes('turn') ||
    t.includes('twist') ||
    t.includes('spin') ||
    t.includes('roll')
  ) {
    // Optional: support "rotate 30"
    const match = t.match(/(\d+)/);
    const degrees = match ? parseInt(match[1], 10) : 15;
    obj.rotation.y += THREE.MathUtils.degToRad(degrees);
  }

  /* ---------- DELETE / REMOVE ---------- */
  else if (
    t.includes('delete') ||
    t.includes('remove') ||
    t.includes('destroy') ||
    t.includes('erase') ||
    t.includes('discard') ||
    t.includes('trash') ||
    t.includes('get rid') ||
    t.includes('clear') ||
    t.includes('kill')
  ) {
    const id = obj.userData?.id;
    removeSharedObject(obj);
    if (id) {
      sendWS({ type: 'delete', id, senderId: clientId });
    }
    return;
  }

  clampToFloor(obj);
  maybeSyncTransform(obj);
}



/* ---------------- XR ---------------- */
async function toggleXRSession(){
  if (currentSession) {
    await currentSession.end();
    currentSession = null;
    document.getElementById('xrButton').textContent = 'Enter XR';
  } else {
    await startXR();
    document.getElementById('xrButton').textContent = 'Exit XR';
  }
}

async function startXR(){
  if (xrMode === 'VR') {
    currentSession = await navigator.xr.requestSession('immersive-vr', { optionalFeatures:['local-floor'] });
    scene.background = new THREE.Color(0xcfe8ff);
    scene.fog = new THREE.Fog(0xcfe8ff, 8, 25);
    ground.visible = true;
    sharedRoot.position.set(0, 0, 0);
    sharedRoot.rotation.set(0, 0, 0);
    if (anchorArrow) anchorArrow.visible = false;
    updateAnchorVisuals();
  } else {
    currentSession = await navigator.xr.requestSession('immersive-ar', { optionalFeatures:['local-floor','hit-test'] });
    scene.background = null;
    scene.fog = null;
    ground.visible = false;
    if (anchorArrow) {
      prepareAnchorForAr();
    }
  }
  renderer.xr.setSession(currentSession);
  currentSession.addEventListener('end', () => {
    sendWS({ type: 'user-leave', senderId: clientId });
  });
}

/* ---------------- SHARED WORLD ---------------- */
function connectWebSocket() {
  const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${protocol}://${window.location.host}`;

  ws = new WebSocket(wsUrl);

  ws.addEventListener('message', event => {
    let msg;
    try {
      msg = JSON.parse(event.data);
    } catch (err) {
      return;
    }

    if (!msg || (msg.senderId && msg.senderId === clientId)) return;
    handleWSMessage(msg);
  });

  ws.addEventListener('close', () => {
    setTimeout(connectWebSocket, 1000);
  });
}

function sendWS(message) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify(message));
}

function handleWSMessage(msg) {
  if (msg.type === 'init' && Array.isArray(msg.objects)) {
    msg.objects.forEach(obj => spawnFromSharedState(obj));
    if (msg.xrMode) applySharedXrMode(msg.xrMode);
    return;
  }

  if (msg.type === 'create' && msg.object) {
    spawnFromSharedState(msg.object);
    return;
  }

  if (msg.type === 'replace' && msg.id && msg.source) {
    const obj = objectsById.get(msg.id);
    if (obj) {
      if (typeof msg.isLoading === 'boolean') {
        obj.userData.isLoading = msg.isLoading;
      }
      loadSourceIntoWrapper(obj, msg.source);
    }
    return;
  }

  if (msg.type === 'update' && msg.id && msg.transform) {
    const obj = objectsById.get(msg.id);
    if (obj) applyTransform(obj, msg.transform);
    return;
  }

  if (msg.type === 'delete' && msg.id) {
    const obj = objectsById.get(msg.id);
    if (obj) removeSharedObject(obj);
    return;
  }

  if (msg.type === 'xr-mode' && (msg.mode === 'VR' || msg.mode === 'AR')) {
    applySharedXrMode(msg.mode);
    return;
  }

  if (msg.type === 'user-state' && msg.position && msg.senderId) {
    updateUserMarker(msg.senderId, msg.position);
    return;
  }

  if (msg.type === 'user-leave' && msg.senderId) {
    removeUserMarker(msg.senderId);
  }
}

function updateUserMarker(senderId, position) {
  if (senderId === clientId) return;
  if (!userMarkerGroup) return;

  let marker = userMarkers.get(senderId);
  if (!marker) {
    const geometry = new THREE.SphereGeometry(0.06, 16, 12);
    const material = new THREE.MeshStandardMaterial({ color: 0x2ecc71 });
    marker = new THREE.Mesh(geometry, material);
    userMarkerGroup.add(marker);
    userMarkers.set(senderId, marker);
  }

  marker.position.set(position.x, position.y, position.z);
}

function removeUserMarker(senderId) {
  const marker = userMarkers.get(senderId);
  if (!marker || !userMarkerGroup) return;
  userMarkerGroup.remove(marker);
  userMarkers.delete(senderId);
}

function getLocalUserPosition() {
  if (!sharedRoot) return null;
  const xrCamera = renderer.xr.getCamera(camera);
  const worldPos = new THREE.Vector3();
  xrCamera.getWorldPosition(worldPos);
  const localPos = worldPos.clone();
  sharedRoot.worldToLocal(localPos);
  return localPos;
}

async function applySharedXrMode(mode) {
  if (xrMode === mode) return;

  xrMode = mode;
  suppressXrBroadcast = true;
  const toggle = document.getElementById('arvrToggle');
  toggle.checked = xrMode === 'AR';

  if (currentSession) {
    await currentSession.end();
  }
  await startXR();
  suppressXrBroadcast = false;
}

function ensureAnchorArrow() {
  if (anchorArrow) return;

  anchorMaterial = new THREE.MeshStandardMaterial({ color: 0xff8c00, metalness: 0.1, roughness: 0.6 });

  const shaftGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.25, 12);
  const headGeo = new THREE.ConeGeometry(0.03, 0.08, 12);

  const shaft = new THREE.Mesh(shaftGeo, anchorMaterial);
  shaft.rotation.x = Math.PI / 2;

  const head = new THREE.Mesh(headGeo, anchorMaterial);
  head.rotation.x = Math.PI / 2;
  head.position.z = 0.18;

  const baseGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.01, 16);
  const base = new THREE.Mesh(baseGeo, anchorMaterial);
  base.position.y = -0.03;

  anchorArrow = new THREE.Group();
  anchorArrow.userData.isAnchorArrow = true;
  anchorArrow.add(shaft, head, base);
  anchorArrow.visible = false;

  scene.add(anchorArrow);
  grabbableObjects.push(anchorArrow);
}

function placeAnchorArrowInFront() {
  const xrCamera = renderer.xr.getCamera(camera);
  const pos = new THREE.Vector3();
  const quat = new THREE.Quaternion();
  xrCamera.getWorldPosition(pos);
  xrCamera.getWorldQuaternion(quat);

  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(quat);
  anchorArrow.position.copy(pos).add(forward.multiplyScalar(1));
  anchorArrow.position.y = pos.y - 0.3;

  const euler = new THREE.Euler().setFromQuaternion(quat, 'YXZ');
  anchorArrow.rotation.set(0, euler.y + Math.PI, 0);
  clampToFloor(anchorArrow);
}

function setWorldPosition(obj, worldPos) {
  const localPos = worldPos.clone();
  if (obj.parent) obj.parent.worldToLocal(localPos);
  obj.position.copy(localPos);
}

function updateAnchorVisuals() {
  if (!anchorMaterial) return;
  anchorMaterial.color.set(anchorSaved ? 0x2ecc71 : 0xff8c00);
}

function applySavedAnchorToRoot() {
  if (!anchorSavedTransform) return;
  sharedRoot.position.copy(anchorSavedTransform.position);
  sharedRoot.rotation.set(
    anchorSavedTransform.rotation.x,
    anchorSavedTransform.rotation.y,
    anchorSavedTransform.rotation.z
  );
}

function placeArrowAtSaved() {
  if (!anchorArrow || !anchorSavedTransform) return;
  anchorArrow.position.copy(anchorSavedTransform.position);
  anchorArrow.rotation.set(
    anchorSavedTransform.rotation.x,
    anchorSavedTransform.rotation.y,
    anchorSavedTransform.rotation.z
  );
}

function prepareAnchorForAr() {
  anchorArrow.visible = true;
  if (anchorSaved && anchorSavedTransform) {
    applySavedAnchorToRoot();
    placeArrowAtSaved();
  } else {
    placeAnchorArrowInFront();
    saveAnchorFromArrow();
  }
  updateAnchorVisuals();
}

function saveAnchorFromArrow() {
  if (!anchorArrow) return;
  sharedRoot.position.copy(anchorArrow.position);
  sharedRoot.rotation.set(anchorArrow.rotation.x, anchorArrow.rotation.y, anchorArrow.rotation.z);
  sharedRoot.scale.set(1, 1, 1);
  anchorSavedTransform = {
    position: anchorArrow.position.clone(),
    rotation: anchorArrow.rotation.clone()
  };
  anchorSaved = true;
  if (rightController?.userData?.grabbedObject === anchorArrow) {
    rightController.userData.grabbedObject = null;
  }
  updateAnchorVisuals();
}

function unlockAnchor() {
  anchorSaved = false;
  updateAnchorVisuals();
}

function spawnFromSharedState(shared) {
  if (!shared || !shared.id || !shared.source) return;
  if (objectsById.has(shared.id)) return;

  const { source, isLoading } = shared;
  if (source.type === 'asset') {
    spawnGLB(source.value, {
      id: shared.id,
      transform: shared.transform,
      markLoading: Boolean(isLoading)
    }).catch(err => {
      console.error('Failed to spawn shared asset:', err);
    });
    return;
  }

  spawnGLB('/assets/loading.glb', {
    id: shared.id,
    transform: shared.transform,
    markLoading: Boolean(isLoading),
    resetOnReplace: false
  }).then(wrapper => {
    loadSourceIntoWrapper(wrapper, source);
  }).catch(err => {
    console.error('Failed to spawn shared object:', err);
  });
}

function removeSharedObject(obj) {
  sharedRoot.remove(obj);
  const idx = grabbableObjects.indexOf(obj);
  if (idx !== -1) grabbableObjects.splice(idx, 1);
  if (obj.userData?.id) objectsById.delete(obj.userData.id);
}

function applyTransform(obj, transform) {
  if (!transform) return;
  if (transform.position) {
    obj.position.set(transform.position.x, transform.position.y, transform.position.z);
  }
  if (transform.rotation) {
    obj.rotation.set(transform.rotation.x, transform.rotation.y, transform.rotation.z);
  }
  if (transform.scale) {
    obj.scale.set(transform.scale.x, transform.scale.y, transform.scale.z);
  }
}

function getTransform(obj) {
  return {
    position: { x: obj.position.x, y: obj.position.y, z: obj.position.z },
    rotation: { x: obj.rotation.x, y: obj.rotation.y, z: obj.rotation.z },
    scale: { x: obj.scale.x, y: obj.scale.y, z: obj.scale.z }
  };
}

function maybeSyncTransform(obj) {
  if (!obj || !obj.userData?.id) return;
  const now = performance.now();
  const last = obj.userData.lastSync || 0;
  if (now - last < SYNC_INTERVAL_MS) return;

  obj.userData.lastSync = now;
  sendWS({
    type: 'update',
    id: obj.userData.id,
    transform: getTransform(obj),
    senderId: clientId
  });
}

/* ---------------- SPAWN ---------------- */
function spawnGLB(url, options = {}) {
  const { id = null, transform = null, markLoading = false, resetOnReplace = false } = options;

  return new Promise((resolve, reject) => {
    loader.load(
      url,
      gltf => {
        const wrapper = new THREE.Group();

        if (transform) {
          applyTransform(wrapper, transform);
        } else {
          const originPos = new THREE.Vector3();
          const originQuat = new THREE.Quaternion();

          if (anchorArrow && anchorArrow.visible) {
            anchorArrow.getWorldPosition(originPos);
            anchorArrow.getWorldQuaternion(originQuat);
          } else {
            const xrCamera = renderer.xr.getCamera(camera);
            xrCamera.getWorldPosition(originPos);
            xrCamera.getWorldQuaternion(originQuat);
          }

          const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(originQuat);
          const target = originPos.add(forward.multiplyScalar(1.2));
          setWorldPosition(wrapper, target);
          wrapper.rotation.set(0, new THREE.Euler().setFromQuaternion(originQuat, 'YXZ').y, 0);
          wrapper.scale.setScalar(0.5);
        }

        gltf.scene.traverse(n => {
          if (n.isMesh && n.material) {
            n.material.side = THREE.DoubleSide;
            if ("metalness" in n.material) n.material.metalness = 0.3;
            if ("roughness" in n.material) n.material.roughness = 0.7;
            n.material.needsUpdate = true;
          }
        });

        wrapper.add(gltf.scene);
        sharedRoot.add(wrapper);
        grabbableObjects.push(wrapper);

        if (id) {
          wrapper.userData.id = id;
          objectsById.set(id, wrapper);
        }

        if (markLoading) wrapper.userData.isLoading = true;
        if (markLoading && !resetOnReplace) wrapper.userData.baseRotation = wrapper.rotation.clone();
        if (markLoading) wrapper.userData.resetOnReplace = resetOnReplace;

        resolve(wrapper);
      },
      undefined,
      reject
    );
  });
}


function replaceWrapperContent(wrapper, newScene) {
  wrapper.userData.isLoading = false;

  while (wrapper.children.length > 0) {
    wrapper.remove(wrapper.children[0]);
  }
  if (wrapper.userData.resetOnReplace) {
    wrapper.rotation.set(0, 0, 0);
    delete wrapper.userData.resetOnReplace;
  } else if (wrapper.userData.baseRotation) {
    wrapper.rotation.copy(wrapper.userData.baseRotation);
    delete wrapper.userData.baseRotation;
  }

  wrapper.add(newScene);
}

function base64ToObjectUrl(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  const blob = new Blob([bytes], { type: "model/gltf-binary" });
  return URL.createObjectURL(blob);
}

function loadSourceIntoWrapper(wrapper, source) {
  if (!source || !source.type || !source.value) return;

  const url = source.type === 'base64' ? base64ToObjectUrl(source.value) : source.value;

  loader.load(url, gltf => {
    gltf.scene.traverse(n => {
      if (n.isMesh && n.material) {
        n.material.side = THREE.DoubleSide;
        if ("metalness" in n.material) n.material.metalness = 0.3;
        if ("roughness" in n.material) n.material.roughness = 0.7;
        n.material.needsUpdate = true;
      }
    });

    replaceWrapperContent(wrapper, gltf.scene);
    if (source.type === 'base64') URL.revokeObjectURL(url);
  });
}


async function sendPrompt() {
  const input = document.getElementById("promptInput");
  if (!input.value.trim()) return;

  // 1. Spawn loading placeholder
  let wrapper;
  try {
    const objectId = crypto.randomUUID();
    wrapper = await spawnGLB("/assets/loading.glb", {
      id: objectId,
      markLoading: true,
      resetOnReplace: true
    });

    sendWS({
      type: 'create',
      senderId: clientId,
      object: {
        id: objectId,
        source: { type: 'asset', value: '/assets/loading.glb' },
        isLoading: true,
        transform: getTransform(wrapper)
      }
    });
  } catch (e) {
    console.error("Failed to load loading.glb", e);
    return;
  }

  try {
    // 2. Call API
    const res = await fetch(SPACE_URL, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${API_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: input.value })
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);

    const json = await res.json();
    const base64 = json?.result?.object_base64;
    if (!base64) throw new Error("No object_base64");

    // 3. Load generated model into local wrapper
    loadSourceIntoWrapper(wrapper, { type: 'base64', value: base64 });

    // 4. Broadcast to shared world
    sendWS({
      type: 'replace',
      id: wrapper.userData.id,
      source: { type: 'base64', value: base64 },
      isLoading: false,
      senderId: clientId
    });

  } catch (err) {
    console.error("Generation failed:", err);

    // 5. Replace with failure model
    loadSourceIntoWrapper(wrapper, { type: 'asset', value: '/assets/failed.glb' });
    sendWS({
      type: 'replace',
      id: wrapper.userData.id,
      source: { type: 'asset', value: '/assets/failed.glb' },
      isLoading: false,
      senderId: clientId
    });
  }

  input.value = "";
}

/* ---------------- RAYS ---------------- */
function addControllerRay(ctrl){
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(),
    new THREE.Vector3(0,0,-1)
  ]);
  const mat = new THREE.LineBasicMaterial({ color:RAY_IDLE });
  const line = new THREE.Line(geo, mat);
  ctrl.add(line);
  ctrl.userData.ray = line;
}

function setRayColor(ctrl,color){
  ctrl.userData.ray.material.color.set(color);
}

function updateRayLength(ctrl,len){
  const p = ctrl.userData.ray.geometry.attributes.position;
  p.setZ(1, -len);
  p.needsUpdate = true;
}

/* ---------------- GRAB ---------------- */
function grabStart(ctrl){
  const hit = raycast(ctrl);
  if (!hit) return;
  if (hit.objectRoot?.userData?.isAnchorArrow && anchorSaved) return;
  ctrl.userData.grabbedObject = hit.objectRoot;
  ctrl.userData.distance = hit.distance;
}

function grabEnd(ctrl){
  ctrl.userData.grabbedObject = null;
}

/* ---------------- RAYCAST ---------------- */
function raycast(ctrl){
  const origin = new THREE.Vector3().setFromMatrixPosition(ctrl.matrixWorld);
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(ctrl.quaternion);
  const hits = new THREE.Raycaster(origin, dir).intersectObjects(grabbableObjects, true);
  if (!hits.length) return null;

  let obj = hits[0].object;
  while (!grabbableObjects.includes(obj)) obj = obj.parent;
  return { objectRoot: obj, distance: hits[0].distance };
}

/* ---------------- LOOP ---------------- */
function animate(){
  renderer.setAnimationLoop(render);
}

function render() {
  const rightHit = raycast(rightController);
  const leftHit  = raycast(leftController);

  const hoveredByRight = rightHit ? rightHit.objectRoot : null;
  const hoveredByLeft  = leftHit  ? leftHit.objectRoot  : null;

  const rightIsAnchor = hoveredByRight?.userData?.isAnchorArrow && xrMode === 'AR';
  const leftIsAnchor = hoveredByLeft?.userData?.isAnchorArrow && xrMode === 'AR';

  hoveredObjectForSpeech = (rightIsAnchor || leftIsAnchor) ? null : (hoveredByRight || hoveredByLeft);
  
  /* ---------- LOADING ROTATION ---------- */
  grabbableObjects.forEach(obj => {
    if (obj.userData?.isLoading) {
      obj.rotation.z += 0.05;
    }
  });
  
  /* ---------- SPEECH COMBO DETECTION ---------- */
  let comboActive = false;

  if (
    hoveredByRight &&
    !hoveredByRight.userData?.isAnchorArrow &&
    rightController.userData.grabbedObject &&
    rightController.userData.rotate
  ) {
    comboActive = true;
  }


  /* ---------- RECORDING STATE ---------- */
  if (comboActive && !autoRecording) {
    speechMode = 'COMMAND';
    autoRecording = true;
    startRecordingInternal();
  }

  if (!comboActive && autoRecording) {
    autoRecording = false;
    stopRecordingInternal();
  }

  const now = performance.now();
  if (currentSession && now - lastUserSync >= USER_SYNC_INTERVAL_MS) {
    const pos = getLocalUserPosition();
    if (pos) {
      sendWS({
        type: 'user-state',
        senderId: clientId,
        position: { x: pos.x, y: pos.y, z: pos.z }
      });
      lastUserSync = now;
    }
  }

  /* ---------- RIGHT CONTROLLER ---------- */
  if (rightIsAnchor) {
    if (!anchorSaved) {
      if (rightController.userData.grabbedObject === anchorArrow) {
        setRayColor(rightController, RAY_ACTIVE);

        const pos = new THREE.Vector3().setFromMatrixPosition(rightController.matrixWorld);
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(rightController.quaternion);

        const target = pos.add(dir.multiplyScalar(rightController.userData.distance));
        setWorldPosition(anchorArrow, target);
        clampToFloor(anchorArrow);

        if (rightController.userData.rotate) {
          anchorArrow.rotation.y -= 0.04;
        }

        updateRayLength(rightController, rightController.userData.distance);
      } else {
        if (rightController.userData.rotate) {
          anchorArrow.rotation.y -= 0.04;
        }
        setRayColor(rightController, rightController.userData.rotate ? RAY_ACTIVE : RAY_HOVER);
        updateRayLength(rightController, rightHit.distance);
      }
    } else {
      setRayColor(rightController, RAY_HOVER);
      updateRayLength(rightController, rightHit.distance);
    }

  } else if (comboActive && hoveredByRight) {
    // Voice-command mode: no manipulation
    setRayColor(rightController, RAY_RECORDING);
    updateRayLength(rightController, rightHit.distance);

  } else if (rightController.userData.grabbedObject) {
    setRayColor(rightController, RAY_ACTIVE);

    const grabbed = rightController.userData.grabbedObject;
    const pos = new THREE.Vector3().setFromMatrixPosition(rightController.matrixWorld);
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(rightController.quaternion);

    const target = pos.add(dir.multiplyScalar(rightController.userData.distance));
    setWorldPosition(grabbed, target);

    if (rightController.userData.rotate) {
      grabbed.rotation.y -= 0.04;
    }

    clampToFloor(grabbed);
    updateRayLength(rightController, rightController.userData.distance);
    maybeSyncTransform(grabbed);

  } else if (rightHit) {
    const obj = rightHit.objectRoot;

    if (rightController.userData.rotate) {
      obj.rotation.y -= 0.04;
      maybeSyncTransform(obj);
    }

    setRayColor(
      rightController,
      rightController.userData.rotate ? RAY_ACTIVE : RAY_HOVER
    );
    updateRayLength(rightController, rightHit.distance);

  } else {
    setRayColor(rightController, RAY_IDLE);
    updateRayLength(rightController, 10);
  }

  /* ---------- LEFT CONTROLLER ---------- */
  if (leftIsAnchor) {
    if (!anchorSaved && leftController.userData.scaleUp) {
      saveAnchorFromArrow();
    }
    if (anchorSaved && leftController.userData.scaleDown) {
      unlockAnchor();
    }
    setRayColor(leftController, anchorSaved ? RAY_ACTIVE : RAY_HOVER);
    updateRayLength(leftController, leftHit.distance);

  } else if (comboActive && hoveredByLeft) {
    // Voice-command mode: no manipulation
    setRayColor(leftController, RAY_RECORDING);
    updateRayLength(leftController, leftHit.distance);

  } else if (leftHit) {
    const obj = leftHit.objectRoot;
    const s = 0.01;

    if (leftController.userData.scaleUp)   obj.scale.multiplyScalar(1 + s);
    if (leftController.userData.scaleDown) obj.scale.multiplyScalar(1 - s);

    obj.scale.clampScalar(0.1, 5);
    clampToFloor(obj);
    if (leftController.userData.scaleUp || leftController.userData.scaleDown) {
      maybeSyncTransform(obj);
    }

    if (leftController.userData.scaleUp || leftController.userData.scaleDown) {
      setRayColor(leftController, RAY_ACTIVE);
    } else {
      setRayColor(leftController, RAY_HOVER);
    }

    updateRayLength(leftController, leftHit.distance);

  } else {
    setRayColor(leftController, RAY_IDLE);
    updateRayLength(leftController, 10);
  }

  renderer.render(scene, camera);
}


/* ---------------- FLOOR CLAMP ---------------- */
function clampToFloor(obj){
  const box = new THREE.Box3().setFromObject(obj);
  const minY = box.min.y;
  if (minY < FLOOR_Y) {
    obj.position.y += (FLOOR_Y - minY);
  }
}

/* ---------------- RESIZE ---------------- */
function onResize(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
