<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XR VR ↔ AR Toggle (Prompt Driven)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }
  canvas { display:block; }

  #ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }

  input {
    padding: 6px 10px;
    font-size: 14px;
    width: 260px;
  }

  button {
    padding: 6px 12px;
    font-size: 14px;
    margin-left: 6px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="ui">
  <input id="promptInput" placeholder="Describe object and press Enter">
  <button id="enterVR">VR</button>
  <button id="enterAR">AR</button>
</div>

<script type="module">
import * as THREE from './three/three.module.js';
import { GLTFLoader } from './three/GLTFLoader.js';

let scene, camera, renderer;
let controller1, controller2;
let ground;
let currentSession = null;

const loader = new GLTFLoader();
const grabbableObjects = [];

init();
animate();

/* -------------------- INIT -------------------- */
function init() {

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEFA);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 50);
  camera.position.set(0,1.6,3);

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  /* Lights */
  scene.add(new THREE.HemisphereLight(0xfff1c1, 0x87cefa, 1.2));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(5,10,5);
  scene.add(dir);

  /* Ground (VR only) */
  ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshStandardMaterial({ color:0x99ee99, roughness:0.8 })
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  /* Controllers */
  controller1 = renderer.xr.getController(0);
  controller2 = renderer.xr.getController(1);
  scene.add(controller1, controller2);

  addControllerRay(controller1);
  addControllerRay(controller2);

  controller1.addEventListener('selectstart', ()=>onSelectStart(controller1));
  controller1.addEventListener('selectend', ()=>onSelectEnd(controller1));
  controller2.addEventListener('selectstart', ()=>onSelectStart(controller2));
  controller2.addEventListener('selectend', ()=>onSelectEnd(controller2));

  /* Rotation */
  controller1.addEventListener('squeezestart', ()=>controller1.userData.rotateRight=true);
  controller1.addEventListener('squeezeend', ()=>controller1.userData.rotateRight=false);
  controller2.addEventListener('squeezestart', ()=>controller2.userData.rotateLeft=true);
  controller2.addEventListener('squeezeend', ()=>controller2.userData.rotateLeft=false);

  /* UI */
  document.getElementById('enterVR').onclick = startVR;
  document.getElementById('enterAR').onclick = startAR;

  const input = document.getElementById('promptInput');
  input.addEventListener('keydown', e=>{
    if(e.key === 'Enter' && input.value.trim()){
      const prompt = input.value.trim();
      console.log('Prompt:', prompt); // backend later
      spawnGLB(prompt);
      input.value = '';
    }
  });

  window.addEventListener('resize', onResize);
}

/* -------------------- XR SESSIONS -------------------- */
async function startVR(){
  if(currentSession) await currentSession.end();
  const session = await navigator.xr.requestSession('immersive-vr',{
    optionalFeatures:['local-floor','bounded-floor']
  });
  renderer.xr.setSession(session);
  currentSession = session;
  scene.background = new THREE.Color(0x87CEFA);
  ground.visible = true;
}

async function startAR(){
  if(currentSession) await currentSession.end();
  const session = await navigator.xr.requestSession('immersive-ar',{
    optionalFeatures:['local-floor','hit-test']
  });
  renderer.xr.setSession(session);
  currentSession = session;
  scene.background = null;
  ground.visible = false;
}

/* -------------------- SPAWN (PROMPT DRIVEN) -------------------- */
function spawnGLB(prompt){
  loader.load('textured_mesh.glb', gltf=>{
    const wrapper = new THREE.Group();
    wrapper.position.copy(camera.position)
      .add(new THREE.Vector3(0,0,-2).applyQuaternion(camera.quaternion));
    wrapper.scale.set(0.5,0.5,0.5);
    wrapper.add(gltf.scene);

    wrapper.userData.prompt = prompt; // attach metadata
    scene.add(wrapper);
    grabbableObjects.push(wrapper);
  });
}

/* -------------------- RAYS -------------------- */
function addControllerRay(controller){
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-10)
  ]);
  const mat = new THREE.LineBasicMaterial({ color:0xffff00 });
  const line = new THREE.Line(geo, mat);
  controller.add(line);
  controller.userData.ray = line;
}

/* -------------------- GRAB -------------------- */
function onSelectStart(ctrl){
  const pos = new THREE.Vector3().setFromMatrixPosition(ctrl.matrixWorld);
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(ctrl.quaternion);

  const raycaster = new THREE.Raycaster(pos,dir);
  const hits = raycaster.intersectObjects(grabbableObjects,true);
  if(!hits.length) return;

  let obj = hits[0].object;
  while(!grabbableObjects.includes(obj)) obj = obj.parent;

  ctrl.userData.grabbing = true;
  ctrl.userData.object = obj;
  ctrl.userData.distance = pos.distanceTo(hits[0].point);
  ctrl.userData.ray.material.color.set(0xff0000);
}

function onSelectEnd(ctrl){
  ctrl.userData.grabbing = false;
  ctrl.userData.object = null;
  ctrl.userData.ray.material.color.set(0xffff00);
}

/* -------------------- LOOP -------------------- */
function animate(){
  renderer.setAnimationLoop(render);
}

function render(){
  [controller1, controller2].forEach(ctrl=>{
    if(ctrl.userData.grabbing && ctrl.userData.object){
      const pos = new THREE.Vector3().setFromMatrixPosition(ctrl.matrixWorld);
      const dir = new THREE.Vector3(0,0,-1).applyQuaternion(ctrl.quaternion);
      ctrl.userData.object.position.copy(
        pos.clone().add(dir.multiplyScalar(ctrl.userData.distance))
      );

      const rotSpeed = 0.04;
      if(ctrl.userData.rotateRight) ctrl.userData.object.rotation.y -= rotSpeed;
      if(ctrl.userData.rotateLeft) ctrl.userData.object.rotation.y += rotSpeed;
    }
  });
  renderer.render(scene,camera);
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
