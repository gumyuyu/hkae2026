<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VR GLB Grab + Rotate + Scale</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }
  canvas { display:block; width:100vw; height:100vh; }
  #spawnInput {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    padding: 5px;
    font-size: 16px;
    z-index: 10;
  }
</style>
</head>
<body>
<input id="spawnInput" type="text" placeholder="Type text and press Enter">

<script type="module">
import * as THREE from './three/three.module.js';
import { VRButton } from './three/VRButton.js';
import { GLTFLoader } from './three/GLTFLoader.js';

let scene, camera, renderer;
let controller1, controller2;
const grabbableObjects = [];
const loader = new GLTFLoader();

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEFA);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 50);
  camera.position.set(0,1.6,3);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  document.body.appendChild(VRButton.createButton(renderer));

  // Lighting
  const hemi = new THREE.HemisphereLight(0xfffbbb, 0x87cefa, 1.2);
  scene.add(hemi);
  const dirLight = new THREE.DirectionalLight(0xffffff,0.6);
  dirLight.position.set(5,10,5);
  scene.add(dirLight);

  // Ground
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshStandardMaterial({color:0x99ee99, roughness:0.8})
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // Controllers
  controller1 = renderer.xr.getController(0);
  controller2 = renderer.xr.getController(1);
  scene.add(controller1, controller2);

  const sphereGeo = new THREE.SphereGeometry(0.03,16,16);
  const sphereMat = new THREE.MeshStandardMaterial({color:0x0000ff});
  controller1.add(new THREE.Mesh(sphereGeo, sphereMat));
  controller2.add(new THREE.Mesh(sphereGeo, sphereMat));

  addControllerRay(controller1);
  addControllerRay(controller2);

  controller1.addEventListener('selectstart', ()=>onSelectStart(controller1));
  controller1.addEventListener('selectend', ()=>onSelectEnd(controller1));
  controller2.addEventListener('selectstart', ()=>onSelectStart(controller2));
  controller2.addEventListener('selectend', ()=>onSelectEnd(controller2));

  // Rotation buttons (squeeze)
  controller1.addEventListener('squeezestart', ()=>{ controller1.userData.rotateRight = true; });
  controller1.addEventListener('squeezeend', ()=>{ controller1.userData.rotateRight = false; });
  controller2.addEventListener('squeezestart', ()=>{ controller2.userData.rotateLeft = true; });
  controller2.addEventListener('squeezeend', ()=>{ controller2.userData.rotateLeft = false; });

  // Controller 1 scale buttons
  controller1.addEventListener('primarypressstart', ()=>{ controller1.userData.scaleUp = true; });
  controller1.addEventListener('primarypressend', ()=>{ controller1.userData.scaleUp = false; });
  controller1.addEventListener('secondarypressstart', ()=>{ controller1.userData.scaleDown = true; });
  controller1.addEventListener('secondarypressend', ()=>{ controller1.userData.scaleDown = false; });

  // Controller 2 push/pull buttons
  controller2.addEventListener('primarypressstart', ()=>{ controller2.userData.moveForward = true; });
  controller2.addEventListener('primarypressend', ()=>{ controller2.userData.moveForward = false; });
  controller2.addEventListener('secondarypressstart', ()=>{ controller2.userData.moveBackward = true; });
  controller2.addEventListener('secondarypressend', ()=>{ controller2.userData.moveBackward = false; });

  window.addEventListener('resize', onWindowResize);

  const input = document.getElementById('spawnInput');
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      const spawnPos = new THREE.Vector3();
      camera.getWorldDirection(spawnPos);
      spawnPos.multiplyScalar(2).add(camera.position);
      spawnGLB(spawnPos);
      input.value = '';
    }
  });
}

function spawnGLB(position){
  loader.load('textured_mesh.glb', gltf=>{
    const group = new THREE.Group();
    group.position.copy(position);
    group.scale.set(0.5,0.5,0.5);
    group.add(gltf.scene);
    scene.add(group);
    grabbableObjects.push(group);
  }, undefined, err=>console.error(err));
}

function addControllerRay(controller){
  const rayLength = 10;
  const rayMaterial = new THREE.LineBasicMaterial({color:0xffff00});
  const rayGeometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),
    new THREE.Vector3(0,0,-rayLength)
  ]);
  const rayLine = new THREE.Line(rayGeometry, rayMaterial);
  controller.add(rayLine);
  controller.userData.rayLine = rayLine;
  controller.userData.rayMaxLength = rayLength;
}

function onSelectStart(controller){
  const raycaster = new THREE.Raycaster();
  const ctrlPos = new THREE.Vector3().setFromMatrixPosition(controller.matrixWorld);
  const rayDir = new THREE.Vector3(0,0,-1).applyQuaternion(controller.quaternion);
  raycaster.set(ctrlPos, rayDir);

  const intersects = raycaster.intersectObjects(grabbableObjects,true);
  if(intersects.length>0){
    let obj = intersects[0].object;
    while(!grabbableObjects.includes(obj)) obj = obj.parent;

    controller.userData.grabbing = true;
    controller.userData.grabbedObject = obj;

    const localHit = obj.worldToLocal(intersects[0].point.clone());
    controller.userData.grabOffset = localHit;
    controller.userData.grabDistance = ctrlPos.distanceTo(intersects[0].point);
    controller.userData.joystickOffset = 0;

    controller.userData.rayLine.material.color.set(0xff0000);
  }
}

function onSelectEnd(controller){
  controller.userData.grabbing = false;
  controller.userData.grabbedObject = null;
  controller.userData.grabOffset = null;
  controller.userData.grabDistance = null;
  controller.userData.joystickOffset = 0;
  controller.userData.rayLine.material.color.set(0xffff00);

  controller1.userData.scaleUp = false;
  controller1.userData.scaleDown = false;
  controller2.userData.moveForward = false;
  controller2.userData.moveBackward = false;
}

function animate(){ renderer.setAnimationLoop(render); }

function render(){
  [controller1, controller2].forEach(ctrl=>{
    if(!ctrl.userData.rayLine) return;

    const ctrlPos = new THREE.Vector3().setFromMatrixPosition(ctrl.matrixWorld);
    const rayDir = new THREE.Vector3(0,0,-1).applyQuaternion(ctrl.quaternion);

    const raycaster = new THREE.Raycaster(ctrlPos, rayDir);
    const intersects = raycaster.intersectObjects(grabbableObjects,true);

    let rayLength = ctrl.userData.rayMaxLength;
    if(intersects.length>0){
      rayLength = ctrlPos.distanceTo(intersects[0].point);
      if(!ctrl.userData.grabbing) ctrl.userData.rayLine.material.color.set(0x00ff00);
    } else if(!ctrl.userData.grabbing){
      ctrl.userData.rayLine.material.color.set(0xffff00);
    }

    if(ctrl.userData.grabbing && ctrl.userData.grabbedObject){
      const obj = ctrl.userData.grabbedObject;

      // Move along ray with controller 2
      const moveSpeed = 0.05;
      if(ctrl.userData.moveForward) ctrl.userData.joystickOffset += moveSpeed;
      if(ctrl.userData.moveBackward) ctrl.userData.joystickOffset -= moveSpeed;

      const totalDistance = ctrl.userData.grabDistance + ctrl.userData.joystickOffset;
      const worldTarget = ctrlPos.clone().add(rayDir.clone().multiplyScalar(totalDistance));
      obj.position.copy(worldTarget).sub(ctrl.userData.grabOffset);

      // Rotate
      const rotationSpeed = 0.05;
      if(ctrl.userData.rotateRight) obj.rotation.y -= rotationSpeed;
      if(ctrl.userData.rotateLeft) obj.rotation.y += rotationSpeed;

      // Scale with controller 1
      const scaleSpeed = 0.01;
      if(ctrl.userData.scaleUp) obj.scale.addScalar(scaleSpeed);
      if(ctrl.userData.scaleDown) obj.scale.addScalar(-scaleSpeed);
      obj.scale.clampScalar(0.1,5);
    }

    const positions = ctrl.userData.rayLine.geometry.attributes.position.array;
    positions[0]=0; positions[1]=0; positions[2]=0;
    positions[3]=0; positions[4]=0; positions[5]=-rayLength;
    ctrl.userData.rayLine.geometry.attributes.position.needsUpdate = true;
  });

  renderer.render(scene,camera);
}

function onWindowResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.updateProjectionMatrix();
}
</script>
</body>
</html>
